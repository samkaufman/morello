name: Rust

on:
  push:
    branches-ignore:
      - "dependabot/**"
  pull_request:

env:
  CARGO_TERM_COLOR: always
  CLANG: clang

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - run: cargo install cargo-all-features
      - run: cargo build-all-features
        env:
          RUSTFLAGS: --deny warnings

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Install libomp
        run: |
          sudo apt update
          sudo apt-get install -y libomp-dev
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run test suite
        run: cargo nextest run --all-features --run-ignored=all --profile ci
      - name: Run documentation tests
        run: cargo test --doc --all-features

  smoke-test-example:
    strategy:
      matrix:
        example:
          - matmul_batch_parallel_x86
          - matmul_chain
          - matmul_x86
          - matvec_gemma_x86_bf16f32
          - simple_matmul_x86
          - softmax_naive
          - softmax2
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Install libomp
        run: |
          sudo apt update
          sudo apt-get install -y libomp-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.example }}
      - run: cargo run --example ${{ matrix.example }}
        env:
          SKIP_BF16_EXECUTION: 1

  smoke-test-frontend:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Install llvm & libomp
        run: |
          brew install llvm@17 libomp
          echo "CLANG=/opt/homebrew/opt/llvm@17/bin/clang" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=/opt/homebrew/opt/libomp/lib" >> "$GITHUB_ENV"
        if: runner.os == 'macOS'
      - name: Install libomp
        run: |
          sudo apt update
          sudo apt-get install -y libomp-dev
        if: runner.os == 'Linux'
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
      - name: Smoke-test 1x1x1 matrix multiplication synthesis & run
        run: cargo run -- run matmul 1

  frontend-memory-regression:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Install libomp
        run: |
          sudo apt update
          sudo apt-get install -y libomp-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build frontend binary
        run: cargo build -p frontend --bin morello
      - name: Measure frontend peak RSS
        run: |
          set -euo pipefail
          /usr/bin/time -f 'peak_rss_kib=%M' -o peak-rss.txt ./target/debug/morello run matmul 2
          cat peak-rss.txt
      - name: Compare against previous committed measurement
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          peak_rss_kib="$(cut -d= -f2 peak-rss.txt)"
          notes_ref="refs/notes/frontend-peak-rss-kib-matmul-2"
          previous_peak_rss_kib=""

          git fetch origin "${notes_ref}:${notes_ref}" || true
          git fetch origin "$DEFAULT_BRANCH" --depth=1

          previous_sha=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -z "$BASE_SHA" ]; then
              echo "Expected BASE_SHA to be set for pull_request events" >&2
              exit 1
            fi
            previous_sha="$BASE_SHA"
          else
            previous_sha="$(git rev-parse "origin/$DEFAULT_BRANCH")"
          fi

          if git notes --ref="$notes_ref" show "$previous_sha" >/tmp/previous-note.txt 2>/dev/null; then
            previous_peak_rss_kib="$(cat /tmp/previous-note.txt | tr -d '[:space:]')"
          fi

          {
            echo "### Frontend peak memory"
            echo
            echo "- Measured peak RSS: ${peak_rss_kib} KiB"
            if [ -n "$previous_peak_rss_kib" ]; then
              echo "- Previous peak RSS note (${previous_sha}): ${previous_peak_rss_kib} KiB"
            else
              echo "- Previous peak RSS note (${previous_sha}): (none found)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$previous_peak_rss_kib" ] && [ "$peak_rss_kib" -gt "$previous_peak_rss_kib" ]; then
            delta_kib="$(( peak_rss_kib - previous_peak_rss_kib ))"
            if [ "$previous_peak_rss_kib" -gt 0 ]; then
              increase_pct="$(( delta_kib * 100 / previous_peak_rss_kib ))"
              if [ "$increase_pct" -ge 7 ]; then
                echo "::warning::Frontend peak RSS regression detected (+${delta_kib} KiB, +${increase_pct}%): ${peak_rss_kib} KiB vs previous ${previous_peak_rss_kib} KiB"
              fi
            else
              echo "::warning::Frontend peak RSS increased (+${delta_kib} KiB): ${peak_rss_kib} KiB vs previous ${previous_peak_rss_kib} KiB"
            fi
          fi
      - name: Store measurement as a git note (push events only)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          notes_ref="refs/notes/frontend-peak-rss-kib-matmul-2"
          peak_rss_kib="$(cut -d= -f2 peak-rss.txt)"
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git fetch origin "${notes_ref}:${notes_ref}" || true
          git notes --ref="$notes_ref" add -f -m "$peak_rss_kib" HEAD
          git push origin "$notes_ref"

  smoke-test-precompute:
    strategy:
      matrix:
        target:
          - avx2
          - avx512
          - arm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: timeout 480 cargo run -p precompute -- --target ${{ matrix.target }} 2  || code=$?; if [[ $code -ne 124 && $code -ne 0 ]]; then exit $code; fi

  clippy-and-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: rustup toolchain install stable --profile default --no-self-update
      - name: Check that code has no Clippy warnings
        run: cargo clippy --all-targets --all-features -- --deny warnings
      - name: Check that code is formatted
        run: cargo fmt --all -- --check

  bench:
    runs-on: ubuntu-22.04
    steps:
      - run: |
          sudo apt-fast update -qq
          DEBIAN_FRONTEND='noninteractive' sudo apt install --no-install-recommends -yq valgrind
      - uses: actions/checkout@v6
      - run: cargo install --version 0.12.3 iai-callgrind-runner
      - name: Run benchmarks
        run: cargo bench --verbose
        working-directory: morello
